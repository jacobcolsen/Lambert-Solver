<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lambert Transfers for Babies</title>
    <style>
        /* ══════════════════════════════════════════
           RESET & ROOT PALETTE
           ══════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:      #07071a;
            --bg-r:    #06060f;
            --border:  #1a2540;
            --dim:     #2e4060;
            --dim2:    #3a5478;
            --text:    #a8bcd4;
            --bright:  #ddeeff;

            /* ── Brand colors — consistent across all spreads ── */
            --cyan:    #00d4ff;   /* spacecraft 1 / departure  */
            --orange:  #ff8c42;   /* spacecraft 2 / target     */
            --gold:    #ffd700;   /* transfer orbit accent     */
            --green:   #4aed88;   /* solved / correct path     */
            --red:     #ff4a6a;
        }

        html, body {
            width: 100%; height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* ══════════════════════════════════════════
           SPREAD LAYOUT
           ══════════════════════════════════════════ */
        #spread {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        #left {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
        }

        /* Baby text zone — top of left panel */
        #baby-area {
            flex-shrink: 0;
            padding: 26px 36px 20px;
            border-bottom: 1px solid var(--border);
            background: rgba(0,0,0,0.18);
        }

        #baby-text {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 34px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.25;
            letter-spacing: -0.3px;
        }

        #baby-sub {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: rgba(180,210,255,0.42);
            margin-top: 7px;
            line-height: 1.55;
            font-style: italic;
        }

        /* Canvas zone — fills rest of left panel */
        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
        }
        #canvas-wrap.panning { cursor: grabbing; }

        #sim {
            display: block;
            position: absolute;
            top: 0; left: 0;
        }

        /* ── RIGHT PANEL ── */
        #right {
            width: 50%;
            background: var(--bg-r);
            overflow-y: auto;
        }

        #right-inner {
            padding: 36px 38px 52px;
        }

        /* Sections */
        .rs { margin-bottom: 30px; }

        .rs h2 {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: 10px;
            font-weight: normal;
            letter-spacing: 3.5px;
            text-transform: uppercase;
            color: var(--dim2);
            margin-bottom: 14px;
            padding-bottom: 7px;
            border-bottom: 1px solid rgba(26,37,64,0.75);
        }

        .rs p {
            font-size: 13.5px;
            line-height: 1.85;
            color: var(--text);
            margin-bottom: 11px;
        }
        .rs p:last-child { margin-bottom: 0; }

        /* Equation block */
        .eq {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: 13.5px;
            line-height: 1.9;
            color: #bcd0ee;
            background: rgba(255,255,255,0.025);
            border-left: 2px solid var(--gold);
            padding: 11px 16px;
            margin: 15px 0;
        }
        .eq em {
            display: block;
            font-size: 9px;
            font-style: normal;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--dim2);
            margin-bottom: 5px;
        }
        .eq .val { color: var(--gold); font-weight: bold; }

        /* Inline colour highlights */
        .hi  { color: var(--cyan);   font-weight: 600; }
        .hig { color: var(--gold); }
        .hio { color: var(--orange); }
        .hig2{ color: var(--green); }

        /* Small italic note */
        .note {
            font-size: 12.5px;
            color: var(--dim2);
            line-height: 1.75;
            font-style: italic;
            border-left: 2px solid rgba(26,37,64,0.9);
            padding-left: 12px;
            margin-top: 10px;
        }

        /* ══════════════════════════════════════════
           BOTTOM NAV BAR
           ══════════════════════════════════════════ */
        #bar {
            flex-shrink: 0;
            height: 52px;
            background: rgba(5,5,18,0.98);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 14px;
        }

        /* Prev / Next buttons */
        .nbtn {
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 2px;
            background: none;
            border: 1px solid var(--border);
            color: var(--dim2);
            padding: 5px 15px;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color 0.18s, color 0.18s;
            flex-shrink: 0;
            user-select: none;
        }
        .nbtn:hover:not(:disabled) { border-color: var(--cyan); color: var(--cyan); }
        .nbtn:disabled { opacity: 0.22; cursor: default; }

        /* Centre info block */
        #bar-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        #bar-book {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 3px;
            color: var(--dim2);
        }
        #bar-spread {
            font-family: 'Courier New', monospace;
            font-size: 9px;
            letter-spacing: 2px;
            color: rgba(46,64,96,0.9);
        }

        /* Speed controls */
        .speed-row {
            display: flex;
            align-items: center;
            gap: 7px;
            flex-shrink: 0;
        }
        #pbtn {
            width: 28px; height: 28px;
            background: none;
            border: 1px solid var(--border);
            color: var(--dim2);
            font-size: 12px;
            cursor: pointer;
            border-radius: 2px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.18s, color 0.18s;
            user-select: none;
        }
        #pbtn:hover { border-color: var(--cyan); color: var(--cyan); }

        #warp-label {
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--text);
            min-width: 40px;
            text-align: right;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SPREAD CONTAINER
     ══════════════════════════════════════════════════ -->
<div id="spread">

    <!-- LEFT: baby text + simulation canvas -->
    <div id="left">
        <div id="baby-area">
            <div id="baby-text"></div>
            <div id="baby-sub"></div>
        </div>
        <div id="canvas-wrap">
            <canvas id="sim"></canvas>
        </div>
    </div>

    <!-- RIGHT: scrollable deep-dive content -->
    <div id="right">
        <div id="right-inner"></div>
    </div>

</div>

<!-- BOTTOM BAR -->
<div id="bar">
    <button class="nbtn" id="btn-prev">◀ PREV</button>
    <div id="bar-center">
        <div id="bar-book">LAMBERT TRANSFERS FOR BABIES</div>
        <div id="bar-spread">SPREAD 1 OF 1</div>
    </div>
    <div class="speed-row">
        <button id="pbtn">▶</button>
        <div id="warp-label">1×</div>
    </div>
    <button class="nbtn" id="btn-next">NEXT ▶</button>
</div>

<!-- ══════════════════════════════════════════════════
     SCRIPT
     ══════════════════════════════════════════════════ -->
<script>
'use strict';

/* ═══════════════════════════════════════════════════
   PHYSICAL CONSTANTS
   ═══════════════════════════════════════════════════ */
const TWO_PI = Math.PI * 2;
const MU     = 3.986004418e5;   // km³/s²  — Earth gravitational parameter
const RE     = 6371;            // km      — Earth mean radius

/* ═══════════════════════════════════════════════════
   ASSET LOADING
   ═══════════════════════════════════════════════════ */
// NASA top-down Earth image.  Slot: replace src string when file is updated.
const earthImg = new Image();
earthImg.src   = 'earth top view.jpg';
earthImg.onload = () => { if (SIM.ready) render(); };

/* ═══════════════════════════════════════════════════
   STAR FIELD
   Positions stored as canvas fractions → stars stay
   fixed behind camera pan/zoom across all spreads.
   ═══════════════════════════════════════════════════ */
const STARS = (() => {
    const a = [];
    for (let i = 0; i < 280; i++) a.push({
        px:    Math.random(),
        py:    Math.random(),
        r:     0.25 + Math.random() * 1.45,
        alpha: 0.12 + Math.random() * 0.65,
    });
    return a;
})();

/* ═══════════════════════════════════════════════════
   SIMULATION STATE
   Single source of truth extended by every spread.
   Never replaced wholesale — just add keys per spread.
   ═══════════════════════════════════════════════════ */
const SIM = {
    // ── Time / animation ──
    time:       0,          // accumulated simulation seconds
    playing:    true,
    warpIndex:  0,
    warpLevels: [1, 10, 100, 1_000, 10_000],
    warpLabels: ['1×', '10×', '100×', '1k×', '10k×'],
    lastRaf:    null,       // rAF timestamp of previous frame (ms)
    ready:      false,      // true once canvas is sized + first spread loaded

    // ── Navigation ──
    spreadIndex: 0,

    // ── Camera  (world = km, y-up;  canvas = px, y-down) ──
    camera: { x: 0, y: 0, scale: 1 },

    // ── Pan drag state ──
    pan: { active: false, cx0: 0, cy0: 0, camX0: 0, camY0: 0 },

    // ── Mouse position in world coordinates ──
    mouse: { wx: 0, wy: 0 },

    // ── Per-spread hover / drag state (reset on spread change) ──
    hover: {},
    drag:  {},
};

/* ═══════════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════════ */
const canvas = document.getElementById('sim');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    const wrap  = document.getElementById('canvas-wrap');
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.resetCamera) sp.resetCamera();
}

/* ── Coordinate transforms ── */
function w2c(wx, wy) {            // world km → canvas px
    return [
        canvas.width  / 2 + (wx - SIM.camera.x) * SIM.camera.scale,
        canvas.height / 2 - (wy - SIM.camera.y) * SIM.camera.scale,
    ];
}
function c2w(cx, cy) {            // canvas px → world km
    return [
        (cx - canvas.width  / 2) / SIM.camera.scale + SIM.camera.x,
       -((cy - canvas.height / 2) / SIM.camera.scale) + SIM.camera.y,
    ];
}
function km2px(d) { return d * SIM.camera.scale; }

/* ═══════════════════════════════════════════════════
   SHARED DRAWING PRIMITIVES
   Used by all spreads — never removed or replaced.
   ═══════════════════════════════════════════════════ */

function drawBg() {
    ctx.fillStyle = '#07071a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

function drawStars() {
    for (const s of STARS) {
        ctx.beginPath();
        ctx.arc(s.px * canvas.width, s.py * canvas.height, s.r, 0, TWO_PI);
        ctx.fillStyle = `rgba(200,215,255,${s.alpha})`;
        ctx.fill();
    }
}

/**
 * drawEarth()
 * Uses the NASA top-down image when available;
 * falls back to a blue gradient sphere placeholder.
 * Pass `t` to animate the subtle atmospheric pulse.
 */
function drawEarth(t = SIM.time) {
    const [cx, cy] = w2c(0, 0);
    const r        = km2px(RE);
    const pulse    = 1 + 0.010 * Math.sin(t * 0.65);   // very gentle breath

    // ── Outer atmosphere glow ──
    const aR   = r * 1.12 * pulse;
    const atmo = ctx.createRadialGradient(cx, cy, r * 0.93, cx, cy, aR);
    atmo.addColorStop(0,    'rgba(80,160,255,0.30)');
    atmo.addColorStop(0.42, 'rgba(50,120,240,0.11)');
    atmo.addColorStop(1,    'rgba(20,80,200,0)');
    ctx.beginPath();
    ctx.arc(cx, cy, aR, 0, TWO_PI);
    ctx.fillStyle = atmo;
    ctx.fill();

    // ── Globe body (clipped to circle) ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TWO_PI);
    ctx.clip();

    if (earthImg.complete && earthImg.naturalWidth > 0) {
        // ── NASA Earth top-down image ──
        // Scale up so the photo fills to the clip edge (compensates
        // for the black border in the source image).
        const s = 1.30;
        ctx.drawImage(earthImg, cx - r*s, cy - r*s, r*2*s, r*2*s);
    } else {
        // ── Gradient placeholder — replace with NASA image ──
        const body = ctx.createRadialGradient(
            cx - r*0.28, cy - r*0.28, r*0.06,
            cx, cy, r
        );
        body.addColorStop(0,    '#5ca8e8');
        body.addColorStop(0.22, '#2a72c8');
        body.addColorStop(0.55, '#1848a0');
        body.addColorStop(1,    '#071232');
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, TWO_PI);
        ctx.fillStyle = body;
        ctx.fill();
    }

    // ── Vignette — spherical depth ──
    const vig = ctx.createRadialGradient(
        cx - r*0.14, cy - r*0.14, r*0.18,
        cx, cy, r
    );
    vig.addColorStop(0,    'rgba(0,0,0,0)');
    vig.addColorStop(0.58, 'rgba(0,0,0,0.07)');
    vig.addColorStop(1,    'rgba(0,0,0,0.70)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TWO_PI);
    ctx.fillStyle = vig;
    ctx.fill();

    ctx.restore();

    // ── Thin atmosphere rim stroke ──
    ctx.beginPath();
    ctx.arc(cx, cy, r * 1.006, 0, TWO_PI);
    ctx.strokeStyle = 'rgba(120,200,255,0.48)';
    ctx.lineWidth   = Math.max(1.5, r * 0.016);
    ctx.stroke();
}

function drawScaleBar() {
    // Find a "nice" km value whose bar width is close to 80 px
    const target = 80 / SIM.camera.scale;
    const exp    = Math.floor(Math.log10(Math.max(target, 1)));
    const pow    = Math.pow(10, exp);
    const frac   = target / pow;
    const nice   = frac < 1.5 ? pow : frac < 3.5 ? 2*pow : frac < 7.5 ? 5*pow : 10*pow;
    const bpx    = km2px(nice);
    const rx     = canvas.width  - 18;
    const by     = canvas.height - 22;
    const bx     = rx - bpx;

    ctx.save();
    ctx.strokeStyle = 'rgba(150,170,210,0.46)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx, by);    ctx.lineTo(rx, by);
    ctx.moveTo(bx, by-5);  ctx.lineTo(bx, by+5);
    ctx.moveTo(rx, by-5);  ctx.lineTo(rx, by+5);
    ctx.stroke();

    const lbl = nice >= 1e6 ? `${(nice/1e6).toFixed(0)} M km`
              : nice >= 1e3 ? `${(nice/1e3).toFixed(nice>=1e4?0:1)}k km`
              :               `${nice.toFixed(0)} km`;
    ctx.font      = '9px Courier New';
    ctx.fillStyle = 'rgba(150,170,210,0.56)';
    ctx.textAlign = 'center';
    ctx.fillText(lbl, bx + bpx/2, by - 8);
    ctx.restore();
}

/**
 * drawArrow — world-coordinate endpoints; zoom-invariant arrowhead.
 * @param {number} lw  line width in px
 * @param {number} hs  arrowhead size in px
 */
function drawArrow(x0w, y0w, x1w, y1w, color, lw = 1.5, hs = 10) {
    const [x0,y0] = w2c(x0w, y0w);
    const [x1,y1] = w2c(x1w, y1w);
    const dx = x1-x0, dy = y1-y0;
    const len = Math.hypot(dx, dy);
    if (len < 2) return;
    const head = Math.min(hs, len * 0.50);
    const ang  = Math.atan2(dy, dx);
    ctx.save();
    ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1 - Math.cos(ang)*head*0.72, y1 - Math.sin(ang)*head*0.72);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1 - head*Math.cos(ang-0.38), y1 - head*Math.sin(ang-0.38));
    ctx.lineTo(x1 - head*Math.cos(ang+0.38), y1 - head*Math.sin(ang+0.38));
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r, y);   c.lineTo(x+w-r, y);   c.arcTo(x+w, y,   x+w, y+r,   r);
    c.lineTo(x+w, y+h-r);                       c.arcTo(x+w, y+h, x+w-r,y+h, r);
    c.lineTo(x+r, y+h); c.lineTo(x+r, y+h);    c.arcTo(x,   y+h, x,   y+h-r, r);
    c.lineTo(x,   y+r);                          c.arcTo(x,   y,   x+r, y,     r);
    c.closePath();
}

/* ═══════════════════════════════════════════════════
   ORBITAL MECHANICS HELPERS
   Minimal set for now; extended in later spreads.
   ═══════════════════════════════════════════════════ */

/** Position vector {x, y} km at true anomaly ν on a Keplerian orbit */
function orbitPos(orbit, nu) {
    const { a, e, omega } = orbit;
    const p = a * (1 - e*e);
    const r = p / (1 + e * Math.cos(nu));
    return { x: r * Math.cos(nu + omega), y: r * Math.sin(nu + omega) };
}

/** Circular orbit speed km/s at radius r */
function vcircular(r) { return Math.sqrt(MU / r); }

/** Orbital period s for semi-major axis a */
function period(a) { return TWO_PI * Math.sqrt(a*a*a / MU); }

/* ═══════════════════════════════════════════════════
   SPREAD 1 — "This is Earth"
   ═══════════════════════════════════════════════════ */

/** Gravitational potential rings — faint, educational, decorative */
function drawGravityRings() {
    const [cx, cy] = w2c(0, 0);
    const er       = km2px(RE);
    const radii    = [1.8, 3.2, 5.8, 10.0, 17.0];   // multiples of Earth radius

    ctx.save();
    ctx.setLineDash([3, 11]);
    for (const f of radii) {
        const alpha = (0.092 / (f * 0.58)).toFixed(3);
        ctx.beginPath();
        ctx.arc(cx, cy, er * f, 0, TWO_PI);
        ctx.strokeStyle = `rgba(50,110,240,${alpha})`;
        ctx.lineWidth   = 0.8;
        ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
}

/** "EARTH" label + radius readout, placed right of the globe */
function drawEarthLabel() {
    const [cx, cy] = w2c(0, 0);
    const r        = km2px(RE);
    const lx       = cx + r + 13;
    const ly       = cy;

    ctx.save();
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.font         = 'bold 11px Courier New';
    ctx.fillStyle    = 'rgba(185,215,255,0.70)';
    ctx.fillText('EARTH', lx, ly);
    ctx.font      = '9px Courier New';
    ctx.fillStyle = 'rgba(115,155,210,0.46)';
    ctx.fillText(`R = ${RE.toLocaleString()} km`, lx, ly + 15);
    ctx.restore();
}

const SPREAD_EARTH = {
    id:       'earth',
    title:    'THIS IS EARTH',
    babyText: 'This is Earth.',
    babySub:  '',   // clean on spread 1 — no sub-line

    resetCamera() {
        // Earth fills ~22% of canvas height; centred at origin
        SIM.camera.x     = 0;
        SIM.camera.y     = 0;
        SIM.camera.scale = (canvas.height * 0.22) / RE;
    },

    update(/* dt */) {
        // Nothing orbits yet — SIM.time advances but scene is static
    },

    render() {
        drawBg();
        drawStars();
        drawGravityRings();
        drawEarth();
        drawEarthLabel();
        drawScaleBar();
    },

    // No spread-specific interaction overrides for spread 1
    onMouseDown: null,
    onMouseMove: null,
    onKeyDown:   null,

    rightHTML: `
        <div class="rs">
            <h2>The Central Body</h2>
            <p>
                Every orbit, every trajectory, every Lambert transfer in this
                book begins here — with <span class="hi">Earth at the center</span>
                and gravity holding everything together.
            </p>
            <p>
                We model the Earth–spacecraft system as a
                <em>two-body problem</em>: one massive central body, one
                infinitesimally small test mass. Earth's internal structure,
                oblateness, atmosphere, and rotation are all ignored.
                What remains is pure gravitational geometry.
            </p>
        </div>

        <div class="rs">
            <h2>Gravitational Parameter μ</h2>
            <p>
                In the two-body model, Earth is treated as a point mass
                characterised by a single constant:
            </p>
            <div class="eq">
                <em>Gravitational parameter</em>
                μ = G · M
            </div>
            <p>
                G is Newton's gravitational constant
                (6.674 × 10⁻¹¹ N m² kg⁻²) and M is Earth's mass
                (5.972 × 10²⁴ kg). In practice we always use their product:
            </p>
            <div class="eq">
                <em>For Earth</em>
                μ ≈ <span class="val">398 600</span> km³ s⁻²
            </div>
            <p>
                μ is the only property of Earth this book needs.
                It sets the speed of every orbit and the energy of
                every transfer manoeuvre.
            </p>
        </div>

        <div class="rs">
            <h2>Equation of Motion</h2>
            <p>
                Under two-body gravity, a spacecraft's acceleration is:
            </p>
            <div class="eq">
                <em>Two-body equation of motion</em>
                r̈ = −( μ / r³ ) r
            </div>
            <p>
                where <span class="hig">r</span> is the position vector from
                Earth's centre and r = |r| is its magnitude.
                This single vector ODE governs all motion in this book —
                every orbit, every transfer path, every rendezvous.
            </p>
        </div>

        <div class="rs">
            <h2>The View From Above</h2>
            <p>
                We are looking down Earth's rotation axis, into the
                <em>orbital plane</em>. Three-dimensional motion collapses
                into 2-D, making position vectors, velocity vectors, and
                transfer arcs easy to see, manipulate, and reason about.
            </p>
            <p class="note">
                The faint concentric rings are gravitational equipotential
                surfaces — each ring marks a constant gravitational potential
                energy. Objects on the same ring share the same potential,
                regardless of direction. Orbital altitude increases outward.
            </p>
        </div>
    `,
};

/* ═══════════════════════════════════════════════════
   SPREADS REGISTRY
   Add new spread objects here as the book grows.
   ═══════════════════════════════════════════════════ */
const SPREADS = [
    SPREAD_EARTH,
    // SPREAD_ORBIT,      // spread 2 — one satellite on a circular orbit
    // SPREAD_VECTORS,    // spread 3 — r and v vectors
    // SPREAD_TWO,        // spread 4 — two spacecraft
    // ...
];

/* ═══════════════════════════════════════════════════
   WARP HUD
   Always drawn last, in the top-right of the canvas.
   ═══════════════════════════════════════════════════ */
function drawWarpHUD() {
    const label = SIM.playing
        ? SIM.warpLabels[SIM.warpIndex]
        : 'PAUSED';
    const col = !SIM.playing
        ? 'rgba(255,74,106,0.80)'
        : SIM.warpIndex > 0
            ? '#ffd700'
            : 'rgba(0,212,255,0.65)';

    ctx.save();
    ctx.font         = 'bold 10px Courier New';
    ctx.fillStyle    = col;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(label, canvas.width - 14, 13);
    ctx.restore();
}

/* ═══════════════════════════════════════════════════
   SPREAD NAVIGATION
   ═══════════════════════════════════════════════════ */
function goTo(index) {
    if (index < 0 || index >= SPREADS.length) return;
    SIM.spreadIndex = index;
    SIM.hover       = {};    // clear hover state
    SIM.drag        = {};    // clear drag state

    const sp = SPREADS[index];

    // Left panel
    document.getElementById('baby-text').textContent = sp.babyText || '';
    document.getElementById('baby-sub').textContent  = sp.babySub  || '';

    // Right panel
    document.getElementById('right-inner').innerHTML = sp.rightHTML || '';
    document.getElementById('right').scrollTop = 0;

    // Bottom bar
    document.getElementById('bar-spread').textContent =
        `SPREAD ${index + 1} OF ${SPREADS.length}`;
    document.getElementById('btn-prev').disabled = (index === 0);
    document.getElementById('btn-next').disabled = (index === SPREADS.length - 1);

    // Camera
    if (sp.resetCamera) sp.resetCamera();
}

/* ═══════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════ */
function animLoop(ts) {
    if (SIM.playing && SIM.lastRaf !== null) {
        const realDt = Math.min((ts - SIM.lastRaf) / 1000, 0.1);   // cap at 100ms
        const dt     = realDt * SIM.warpLevels[SIM.warpIndex];
        SIM.time    += dt;
        const sp = SPREADS[SIM.spreadIndex];
        if (sp && sp.update) sp.update(dt);
    }
    SIM.lastRaf = ts;
    render();
    requestAnimationFrame(animLoop);
}

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
function render() {
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.render) {
        sp.render();
    } else {
        // Fallback if a spread hasn't defined its render yet
        drawBg(); drawStars(); drawEarth(); drawScaleBar();
    }
    drawWarpHUD();   // always on top
}

/* ═══════════════════════════════════════════════════
   BOTTOM BAR SYNC
   ═══════════════════════════════════════════════════ */
function syncBar() {
    document.getElementById('pbtn').textContent       = SIM.playing ? '⏸' : '▶';
    document.getElementById('warp-label').textContent = SIM.warpLabels[SIM.warpIndex];
}

/* ═══════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════ */

// ── Navigation ──
document.getElementById('btn-prev').addEventListener('click', () => goTo(SIM.spreadIndex - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(SIM.spreadIndex + 1));

// ── Play / Pause ──
document.getElementById('pbtn').addEventListener('click', () => {
    SIM.playing = !SIM.playing;
    syncBar();
});

// ── Scroll-wheel zoom (zoom toward cursor) ──
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor   = e.deltaY > 0 ? 0.87 : 1.14;
    const [wx, wy] = c2w(e.offsetX, e.offsetY);
    SIM.camera.scale *= factor;
    // Keep the world point under the cursor stationary after zoom
    SIM.camera.x = wx - (e.offsetX - canvas.width  / 2) / SIM.camera.scale;
    SIM.camera.y = wy + (e.offsetY - canvas.height / 2) / SIM.camera.scale;
}, { passive: false });

// ── Mouse drag — pan (default) or spread-specific ──
const wrap = document.getElementById('canvas-wrap');

canvas.addEventListener('mousedown', (e) => {
    const sp = SPREADS[SIM.spreadIndex];
    // Let the current spread handle it first; return true to consume.
    if (sp && sp.onMouseDown && sp.onMouseDown(e)) return;
    // Default: begin pan
    SIM.pan = { active: true, cx0: e.offsetX, cy0: e.offsetY,
                camX0: SIM.camera.x, camY0: SIM.camera.y };
    wrap.classList.add('panning');
});

canvas.addEventListener('mousemove', (e) => {
    const [wx, wy] = c2w(e.offsetX, e.offsetY);
    SIM.mouse = { wx, wy };
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.onMouseMove && sp.onMouseMove(e)) return;
    if (SIM.pan.active) {
        SIM.camera.x = SIM.pan.camX0 - (e.offsetX - SIM.pan.cx0) / SIM.camera.scale;
        SIM.camera.y = SIM.pan.camY0 + (e.offsetY - SIM.pan.cy0) / SIM.camera.scale;
    }
});

function endPan() {
    SIM.pan.active = false;
    wrap.classList.remove('panning');
}
canvas.addEventListener('mouseup',    endPan);
canvas.addEventListener('mouseleave', endPan);

// ── Touch — single-finger pan + two-finger pinch zoom ──
let _pinchDist = null;

canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
        const t = e.touches[0];
        SIM.pan = { active: true, cx0: t.clientX, cy0: t.clientY,
                    camX0: SIM.camera.x, camY0: SIM.camera.y };
    } else if (e.touches.length === 2) {
        _pinchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && SIM.pan.active) {
        const t = e.touches[0];
        SIM.camera.x = SIM.pan.camX0 - (t.clientX - SIM.pan.cx0) / SIM.camera.scale;
        SIM.camera.y = SIM.pan.camY0 + (t.clientY - SIM.pan.cy0) / SIM.camera.scale;
    } else if (e.touches.length === 2 && _pinchDist) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        SIM.camera.scale *= dist / _pinchDist;
        _pinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', () => {
    SIM.pan.active = false;
    _pinchDist     = null;
});

// ── Keyboard — global controls; spread can intercept first ──
document.addEventListener('keydown', (e) => {
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.onKeyDown && sp.onKeyDown(e)) return;   // spread consumed it

    switch (e.key) {
        case ' ':
        case 'Spacebar':
            e.preventDefault();
            SIM.playing = !SIM.playing;
            syncBar();
            break;
        case '.':
            SIM.warpIndex = Math.min(SIM.warpIndex + 1, SIM.warpLevels.length - 1);
            syncBar();
            break;
        case ',':
            SIM.warpIndex = Math.max(SIM.warpIndex - 1, 0);
            syncBar();
            break;
    }
});

// ── Resize ──
window.addEventListener('resize', () => {
    resizeCanvas();
    render();
});

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
function init() {
    resizeCanvas();
    goTo(0);
    syncBar();
    SIM.ready = true;
    requestAnimationFrame(animLoop);
}

if (document.readyState === 'complete') {
    init();
} else {
    window.addEventListener('load', init);
}
</script>
</body>
</html>
