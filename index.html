<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lambert Transfers for Babies</title>
    <style>
        /* ══════════════════════════════════════════
           RESET & ROOT PALETTE  — light / book style
           ══════════════════════════════════════════ */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            /* ── Page tones ── */
            --bg:        #ffffff;        /* left panel / canvas bg   */
            --bg-r:      #f7f6f2;        /* right panel: warm white  */
            --border:    #e2dfd8;        /* panel divider            */
            --dim:       #aaa89e;        /* muted label color        */
            --text:      #2e2b26;        /* body text                */
            --bright:    #111010;        /* headings                 */

            /* ── Brand colors (kept consistent across all spreads) ── */
            --cyan:      #0099bb;   /* spacecraft 1 / departure  */
            --orange:    #e06820;   /* spacecraft 2 / target     */
            --gold:      #b89000;   /* transfer orbit / accent   */
            --green:     #28a060;   /* solved / correct path     */
            --red:       #cc2244;
        }

        html, body {
            width: 100%; height: 100vh;
            overflow: hidden;
            background: var(--bg);
            color: var(--text);
        }

        body {
            display: flex;
            flex-direction: column;
            /* Right-panel body copy uses a humanist serif */
            font-family: Georgia, 'Times New Roman', serif;
        }

        /* ══════════════════════════════════════════
           SPREAD LAYOUT
           ══════════════════════════════════════════ */
        #spread {
            display: flex;
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── LEFT PANEL ── */
        #left {
            width: 50%;
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--border);
            overflow: hidden;
            background: var(--bg);
        }

        /* Baby text zone */
        #baby-area {
            flex-shrink: 0;
            padding: 36px 44px 0px;
            /* blends seamlessly with the canvas — no divider */
        }

        #baby-text {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 36px;
            font-weight: 800;
            color: var(--bright);
            line-height: 1.20;
            letter-spacing: -0.5px;
        }

        #baby-sub {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 15px;
            font-weight: 400;
            color: var(--dim);
            margin-top: 8px;
            line-height: 1.55;
        }

        /* Canvas zone */
        #canvas-wrap {
            flex: 1;
            position: relative;
            overflow: hidden;
            cursor: grab;
            background: var(--bg);
        }
        #canvas-wrap.panning { cursor: grabbing; }

        #sim {
            display: block;
            position: absolute;
            top: 0; left: 0;
        }

        /* ── RIGHT PANEL ── */
        #right {
            width: 50%;
            background: var(--bg-r);
            overflow-y: auto;
            border-left: 1px solid var(--border);
        }

        #right-inner {
            padding: 40px 42px 56px;
        }

        /* Sections */
        .rs { margin-bottom: 32px; }

        .rs h2 {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }

        .rs p {
            font-size: 14px;
            line-height: 1.82;
            color: var(--text);
            margin-bottom: 11px;
        }
        .rs p:last-child { margin-bottom: 0; }

        /* Equation block */
        .eq {
            font-family: 'Courier New', 'Courier', monospace;
            font-size: 13.5px;
            line-height: 1.95;
            color: #1e1c18;
            background: rgba(0,0,0,0.035);
            border-left: 3px solid var(--gold);
            padding: 12px 18px;
            margin: 16px 0;
            border-radius: 0 3px 3px 0;
        }
        .eq em {
            display: block;
            font-size: 9px;
            font-style: normal;
            letter-spacing: 2.5px;
            text-transform: uppercase;
            color: var(--dim);
            margin-bottom: 6px;
        }
        .eq .val {
            color: #7a6000;
            font-weight: bold;
        }

        /* Inline highlights */
        .hi  { color: var(--cyan);   font-weight: 600; }
        .hig { color: var(--gold); }
        .hio { color: var(--orange); }
        .hig2{ color: var(--green); }

        /* Small italic note */
        .note {
            font-size: 13px;
            color: var(--dim);
            line-height: 1.72;
            font-style: italic;
            border-left: 2px solid var(--border);
            padding-left: 13px;
            margin-top: 12px;
        }

        /* ══════════════════════════════════════════
           BOTTOM NAV BAR
           ══════════════════════════════════════════ */
        #bar {
            flex-shrink: 0;
            height: 52px;
            background: var(--bg-r);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 22px;
            gap: 14px;
        }

        /* Prev / Next */
        .nbtn {
            font-family: system-ui, -apple-system, 'Helvetica Neue', Arial, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            background: none;
            border: 1.5px solid var(--border);
            color: var(--dim);
            padding: 5px 16px;
            cursor: pointer;
            border-radius: 4px;
            transition: border-color 0.18s, color 0.18s;
            flex-shrink: 0;
            user-select: none;
        }
        .nbtn:hover:not(:disabled) {
            border-color: var(--cyan);
            color: var(--cyan);
        }
        .nbtn:disabled { opacity: 0.30; cursor: default; }

        /* Centre */
        #bar-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1px;
        }
        #bar-book {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--dim);
        }
        #bar-spread {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 10px;
            letter-spacing: 1px;
            color: #ccc9c2;
        }

        /* Speed controls */
        .speed-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }
        #pbtn {
            width: 30px; height: 30px;
            background: none;
            border: 1.5px solid var(--border);
            color: var(--dim);
            font-size: 13px;
            cursor: pointer;
            border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            transition: border-color 0.18s, color 0.18s;
            user-select: none;
        }
        #pbtn:hover { border-color: var(--cyan); color: var(--cyan); }

        #warp-label {
            font-family: system-ui, -apple-system, sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.5px;
            color: var(--text);
            min-width: 36px;
            text-align: right;
        }

        /* scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d8d4cc; border-radius: 3px; }
    </style>
</head>
<body>

<!-- ══════════════════════════════════════════════════
     SPREAD CONTAINER
     ══════════════════════════════════════════════════ -->
<div id="spread">

    <!-- LEFT: baby text + simulation canvas -->
    <div id="left">
        <div id="baby-area">
            <div id="baby-text"></div>
            <div id="baby-sub"></div>
        </div>
        <div id="canvas-wrap">
            <canvas id="sim"></canvas>
        </div>
    </div>

    <!-- RIGHT: scrollable deep-dive content -->
    <div id="right">
        <div id="right-inner"></div>
    </div>

</div>

<!-- BOTTOM BAR -->
<div id="bar">
    <button class="nbtn" id="btn-prev">◀ Prev</button>
    <div id="bar-center">
        <div id="bar-book">Lambert Transfers for Babies</div>
        <div id="bar-spread">Spread 1 of 1</div>
    </div>
    <div class="speed-row">
        <button id="pbtn">▶</button>
        <div id="warp-label">1×</div>
    </div>
    <button class="nbtn" id="btn-next">Next ▶</button>
</div>

<!-- ══════════════════════════════════════════════════
     SCRIPT
     ══════════════════════════════════════════════════ -->
<script>
'use strict';

/* ═══════════════════════════════════════════════════
   PHYSICAL CONSTANTS
   ═══════════════════════════════════════════════════ */
const TWO_PI = Math.PI * 2;
const MU     = 3.986004418e5;   // km³/s²  — Earth gravitational parameter
const RE     = 6371;            // km      — Earth mean radius

/* ═══════════════════════════════════════════════════
   ASSET LOADING
   ═══════════════════════════════════════════════════ */
// NASA top-down Earth image — replace src if file is renamed.
const earthImg = new Image();
earthImg.src   = 'earth top view.jpg';
earthImg.onload = () => { if (SIM.ready) render(); };

/* ═══════════════════════════════════════════════════
   SIMULATION STATE
   Single source of truth; extended per spread.
   ═══════════════════════════════════════════════════ */
const SIM = {
    time:       0,
    playing:    true,
    warpIndex:  0,
    warpLevels: [1, 10, 100, 1_000, 10_000],
    warpLabels: ['1×', '10×', '100×', '1k×', '10k×'],
    lastRaf:    null,
    ready:      false,
    spreadIndex: 0,
    camera: { x: 0, y: 0, scale: 1 },
    pan:    { active: false, cx0: 0, cy0: 0, camX0: 0, camY0: 0 },
    mouse:  { wx: 0, wy: 0 },
    hover:  {},
    drag:   {},
};

/* ═══════════════════════════════════════════════════
   CANVAS
   ═══════════════════════════════════════════════════ */
const canvas = document.getElementById('sim');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
    const wrap  = document.getElementById('canvas-wrap');
    canvas.width  = wrap.clientWidth;
    canvas.height = wrap.clientHeight;
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.resetCamera) sp.resetCamera();
}

function w2c(wx, wy) {
    return [
        canvas.width  / 2 + (wx - SIM.camera.x) * SIM.camera.scale,
        canvas.height / 2 - (wy - SIM.camera.y) * SIM.camera.scale,
    ];
}
function c2w(cx, cy) {
    return [
        (cx - canvas.width  / 2) / SIM.camera.scale + SIM.camera.x,
       -((cy - canvas.height / 2) / SIM.camera.scale) + SIM.camera.y,
    ];
}
function km2px(d) { return d * SIM.camera.scale; }

/* ═══════════════════════════════════════════════════
   SHARED DRAWING PRIMITIVES
   ═══════════════════════════════════════════════════ */

function drawBg() {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
}

/**
 * drawEarth()
 * On a white background: clean sphere with an oval drop-shadow below,
 * NASA image when loaded, gradient placeholder otherwise.
 */
function drawEarth(t = SIM.time) {
    const [cx, cy] = w2c(0, 0);
    const r        = km2px(RE);

    // ── Oval drop-shadow beneath the globe ──
    // Mimics the soft ground-shadow in Baby University illustrations.
    ctx.save();
    ctx.scale(1, 0.28);           // squash vertically for an oval
    ctx.beginPath();
    ctx.arc(cx, (cy + r * 1.18) / 0.28, r * 0.72, 0, TWO_PI);
    ctx.fillStyle = 'rgba(0,0,0,0.10)';
    ctx.filter    = 'blur(12px)';
    ctx.fill();
    ctx.filter = 'none';
    ctx.restore();

    // ── Globe body ──
    ctx.save();
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TWO_PI);
    ctx.clip();

    if (earthImg.complete && earthImg.naturalWidth > 0) {
        // NASA top-down image — scale up so it fills the clip circle
        const s = 1.30;
        ctx.drawImage(earthImg, cx - r*s, cy - r*s, r*2*s, r*2*s);
    } else {
        // ── Gradient placeholder: soft blue sphere ──
        // Style: pastel, Baby-University-flavoured
        const body = ctx.createRadialGradient(
            cx - r*0.32, cy - r*0.32, r*0.04,
            cx, cy, r
        );
        body.addColorStop(0,    '#a8d8f0');   // light highlight
        body.addColorStop(0.30, '#6ab4dc');
        body.addColorStop(0.70, '#3888c0');
        body.addColorStop(1,    '#1c5c98');
        ctx.beginPath();
        ctx.arc(cx, cy, r, 0, TWO_PI);
        ctx.fillStyle = body;
        ctx.fill();
    }

    // ── Very subtle vignette for depth ──
    const vig = ctx.createRadialGradient(
        cx - r*0.12, cy - r*0.12, r*0.20,
        cx, cy, r
    );
    vig.addColorStop(0,    'rgba(0,0,0,0)');
    vig.addColorStop(0.60, 'rgba(0,0,0,0.04)');
    vig.addColorStop(1,    'rgba(0,0,0,0.28)');
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TWO_PI);
    ctx.fillStyle = vig;
    ctx.fill();

    ctx.restore();

    // ── Thin rim — very subtle on white background ──
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, TWO_PI);
    ctx.strokeStyle = 'rgba(30,100,200,0.18)';
    ctx.lineWidth   = Math.max(1, r * 0.010);
    ctx.stroke();
}

function drawScaleBar() {
    const target = 80 / SIM.camera.scale;
    const exp    = Math.floor(Math.log10(Math.max(target, 1)));
    const pow    = Math.pow(10, exp);
    const frac   = target / pow;
    const nice   = frac < 1.5 ? pow : frac < 3.5 ? 2*pow : frac < 7.5 ? 5*pow : 10*pow;
    const bpx    = km2px(nice);
    const rx     = canvas.width  - 18;
    const by     = canvas.height - 22;
    const bx     = rx - bpx;

    ctx.save();
    ctx.strokeStyle = 'rgba(100,95,88,0.40)';
    ctx.lineWidth   = 1.5;
    ctx.beginPath();
    ctx.moveTo(bx, by);    ctx.lineTo(rx, by);
    ctx.moveTo(bx, by-5);  ctx.lineTo(bx, by+5);
    ctx.moveTo(rx, by-5);  ctx.lineTo(rx, by+5);
    ctx.stroke();

    const lbl = nice >= 1e6 ? `${(nice/1e6).toFixed(0)} M km`
              : nice >= 1e3 ? `${(nice/1e3).toFixed(nice>=1e4?0:1)}k km`
              :               `${nice.toFixed(0)} km`;
    ctx.font      = '9px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(100,95,88,0.55)';
    ctx.textAlign = 'center';
    ctx.fillText(lbl, bx + bpx/2, by - 8);
    ctx.restore();
}

/**
 * drawArrow — world-coord endpoints, zoom-invariant arrowhead.
 * @param {number} lw  line width px
 * @param {number} hs  arrowhead size px
 */
function drawArrow(x0w, y0w, x1w, y1w, color, lw = 2, hs = 11) {
    const [x0,y0] = w2c(x0w, y0w);
    const [x1,y1] = w2c(x1w, y1w);
    const dx = x1-x0, dy = y1-y0;
    const len = Math.hypot(dx, dy);
    if (len < 2) return;
    const head = Math.min(hs, len * 0.50);
    const ang  = Math.atan2(dy, dx);
    ctx.save();
    ctx.strokeStyle = color; ctx.fillStyle = color;
    ctx.lineWidth = lw; ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x0, y0);
    ctx.lineTo(x1 - Math.cos(ang)*head*0.72, y1 - Math.sin(ang)*head*0.72);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x1 - head*Math.cos(ang-0.38), y1 - head*Math.sin(ang-0.38));
    ctx.lineTo(x1 - head*Math.cos(ang+0.38), y1 - head*Math.sin(ang+0.38));
    ctx.closePath(); ctx.fill();
    ctx.restore();
}

function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r, y);   c.lineTo(x+w-r, y);   c.arcTo(x+w, y,   x+w, y+r,   r);
    c.lineTo(x+w, y+h-r);                       c.arcTo(x+w, y+h, x+w-r,y+h, r);
    c.lineTo(x+r, y+h);                          c.arcTo(x,   y+h, x,   y+h-r, r);
    c.lineTo(x,   y+r);                          c.arcTo(x,   y,   x+r, y,     r);
    c.closePath();
}

/* ═══════════════════════════════════════════════════
   ORBITAL MECHANICS HELPERS
   ═══════════════════════════════════════════════════ */
function orbitPos(orbit, nu) {
    const { a, e, omega } = orbit;
    const p = a * (1 - e*e);
    const r = p / (1 + e * Math.cos(nu));
    return { x: r * Math.cos(nu + omega), y: r * Math.sin(nu + omega) };
}
function vcircular(r) { return Math.sqrt(MU / r); }
function period(a)    { return TWO_PI * Math.sqrt(a*a*a / MU); }

/* ═══════════════════════════════════════════════════
   SPREAD 1 — "This is Earth"
   ═══════════════════════════════════════════════════ */

/** Gravitational potential rings — very faint, light-themed */
function drawGravityRings() {
    const [cx, cy] = w2c(0, 0);
    const er       = km2px(RE);
    const radii    = [1.8, 3.2, 5.8, 10.0, 17.0];

    ctx.save();
    ctx.setLineDash([4, 12]);
    for (const f of radii) {
        const alpha = Math.min(0.18, 0.10 / (f * 0.45));
        ctx.beginPath();
        ctx.arc(cx, cy, er * f, 0, TWO_PI);
        ctx.strokeStyle = `rgba(30,100,200,${alpha.toFixed(3)})`;
        ctx.lineWidth   = 0.9;
        ctx.stroke();
    }
    ctx.setLineDash([]);
    ctx.restore();
}

/** "EARTH" label with radius readout — dark text on white */
function drawEarthLabel() {
    const [cx, cy] = w2c(0, 0);
    const r        = km2px(RE);
    const lx       = cx + r + 14;
    const ly       = cy;

    ctx.save();
    ctx.textAlign    = 'left';
    ctx.textBaseline = 'middle';
    ctx.font         = 'bold 12px system-ui, sans-serif';
    ctx.fillStyle    = 'rgba(30,28,24,0.55)';
    ctx.fillText('EARTH', lx, ly);
    ctx.font      = '10px system-ui, sans-serif';
    ctx.fillStyle = 'rgba(30,28,24,0.30)';
    ctx.fillText(`R = ${RE.toLocaleString()} km`, lx, ly + 17);
    ctx.restore();
}

const SPREAD_EARTH = {
    id:       'earth',
    title:    'This is Earth',
    babyText: 'This is Earth.',
    babySub:  '',

    resetCamera() {
        SIM.camera.x     = 0;
        SIM.camera.y     = 0;
        SIM.camera.scale = (canvas.height * 0.28) / RE;
    },

    update(/* dt */) { /* nothing moves on spread 1 */ },

    render() {
        drawBg();
        drawGravityRings();
        drawEarth();
        drawEarthLabel();
        drawScaleBar();
    },

    onMouseDown: null,
    onMouseMove: null,
    onKeyDown:   null,

    rightHTML: `
        <div class="rs">
            <h2>The Central Body</h2>
            <p>
                Every orbit, every trajectory, every Lambert transfer in this
                book begins here — with <span class="hi">Earth at the center</span>
                and gravity holding everything together.
            </p>
            <p>
                We model the Earth–spacecraft system as a
                <em>two-body problem</em>: one massive central body, one
                infinitesimally small test mass. Earth's internal structure,
                oblateness, and atmosphere are all ignored.
                What remains is pure gravitational geometry.
            </p>
        </div>

        <div class="rs">
            <h2>Gravitational Parameter μ</h2>
            <p>
                In the two-body model, Earth is treated as a point mass
                characterised by a single constant:
            </p>
            <div class="eq">
                <em>Gravitational parameter</em>
                μ = G · M
            </div>
            <p>
                G is Newton's gravitational constant
                (6.674 × 10⁻¹¹ N m² kg⁻²) and M is Earth's mass
                (5.972 × 10²⁴ kg). In practice we always use their product:
            </p>
            <div class="eq">
                <em>For Earth</em>
                μ ≈ <span class="val">398 600</span> km³ s⁻²
            </div>
            <p>
                μ is the only property of Earth this book needs.
                It sets the speed of every orbit and the energy of
                every transfer manoeuvre.
            </p>
        </div>

        <div class="rs">
            <h2>Equation of Motion</h2>
            <p>
                Under two-body gravity, a spacecraft's acceleration is:
            </p>
            <div class="eq">
                <em>Two-body equation of motion</em>
                r̈ = −( μ / r³ ) · r
            </div>
            <p>
                where <strong>r</strong> is the position vector from
                Earth's centre and r = |<strong>r</strong>| is its magnitude.
                This single vector ODE governs all motion in this book —
                every orbit, every transfer path, every rendezvous.
            </p>
        </div>

        <div class="rs">
            <h2>The View From Above</h2>
            <p>
                We are looking down Earth's rotation axis, into the
                <em>orbital plane</em>. Three-dimensional motion collapses
                into 2-D, making position vectors, velocity vectors, and
                transfer arcs easy to see, drag, and reason about.
            </p>
            <p class="note">
                The faint concentric rings are gravitational equipotential
                surfaces. Objects on the same ring share the same potential
                energy regardless of direction. Altitude increases outward.
            </p>
        </div>
    `,
};

/* ═══════════════════════════════════════════════════
   SPREADS REGISTRY
   ═══════════════════════════════════════════════════ */
const SPREADS = [
    SPREAD_EARTH,
    // SPREAD_ORBIT,    // spread 2
    // SPREAD_VECTORS,  // spread 3
    // ...
];

/* ═══════════════════════════════════════════════════
   WARP HUD  — small indicator, dark text on white
   ═══════════════════════════════════════════════════ */
function drawWarpHUD() {
    const label = SIM.playing
        ? SIM.warpLabels[SIM.warpIndex]
        : 'PAUSED';
    const col = !SIM.playing
        ? 'rgba(180,40,60,0.75)'
        : SIM.warpIndex > 0
            ? 'rgba(140,110,0,0.80)'
            : 'rgba(30,28,24,0.28)';

    ctx.save();
    ctx.font         = 'bold 10px system-ui, sans-serif';
    ctx.fillStyle    = col;
    ctx.textAlign    = 'right';
    ctx.textBaseline = 'top';
    ctx.fillText(label, canvas.width - 14, 13);
    ctx.restore();
}

/* ═══════════════════════════════════════════════════
   SPREAD NAVIGATION
   ═══════════════════════════════════════════════════ */
function goTo(index) {
    if (index < 0 || index >= SPREADS.length) return;
    SIM.spreadIndex = index;
    SIM.hover       = {};
    SIM.drag        = {};

    const sp = SPREADS[index];
    document.getElementById('baby-text').textContent = sp.babyText || '';
    document.getElementById('baby-sub').textContent  = sp.babySub  || '';
    document.getElementById('right-inner').innerHTML = sp.rightHTML || '';
    document.getElementById('right').scrollTop = 0;
    document.getElementById('bar-spread').textContent =
        `Spread ${index + 1} of ${SPREADS.length}`;
    document.getElementById('btn-prev').disabled = (index === 0);
    document.getElementById('btn-next').disabled = (index === SPREADS.length - 1);

    if (sp.resetCamera) sp.resetCamera();
}

/* ═══════════════════════════════════════════════════
   ANIMATION LOOP
   ═══════════════════════════════════════════════════ */
function animLoop(ts) {
    if (SIM.playing && SIM.lastRaf !== null) {
        const realDt = Math.min((ts - SIM.lastRaf) / 1000, 0.1);
        const dt     = realDt * SIM.warpLevels[SIM.warpIndex];
        SIM.time    += dt;
        const sp = SPREADS[SIM.spreadIndex];
        if (sp && sp.update) sp.update(dt);
    }
    SIM.lastRaf = ts;
    render();
    requestAnimationFrame(animLoop);
}

/* ═══════════════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════════════ */
function render() {
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.render) sp.render();
    else { drawBg(); drawEarth(); drawScaleBar(); }
    drawWarpHUD();
}

/* ═══════════════════════════════════════════════════
   BAR SYNC
   ═══════════════════════════════════════════════════ */
function syncBar() {
    document.getElementById('pbtn').textContent       = SIM.playing ? '⏸' : '▶';
    document.getElementById('warp-label').textContent = SIM.warpLabels[SIM.warpIndex];
}

/* ═══════════════════════════════════════════════════
   EVENT HANDLERS
   ═══════════════════════════════════════════════════ */
document.getElementById('btn-prev').addEventListener('click', () => goTo(SIM.spreadIndex - 1));
document.getElementById('btn-next').addEventListener('click', () => goTo(SIM.spreadIndex + 1));

document.getElementById('pbtn').addEventListener('click', () => {
    SIM.playing = !SIM.playing;
    syncBar();
});

// Zoom toward cursor
canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    const factor   = e.deltaY > 0 ? 0.87 : 1.14;
    const [wx, wy] = c2w(e.offsetX, e.offsetY);
    SIM.camera.scale *= factor;
    SIM.camera.x = wx - (e.offsetX - canvas.width  / 2) / SIM.camera.scale;
    SIM.camera.y = wy + (e.offsetY - canvas.height / 2) / SIM.camera.scale;
}, { passive: false });

const wrap = document.getElementById('canvas-wrap');

canvas.addEventListener('mousedown', (e) => {
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.onMouseDown && sp.onMouseDown(e)) return;
    SIM.pan = { active: true, cx0: e.offsetX, cy0: e.offsetY,
                camX0: SIM.camera.x, camY0: SIM.camera.y };
    wrap.classList.add('panning');
});

canvas.addEventListener('mousemove', (e) => {
    const [wx, wy] = c2w(e.offsetX, e.offsetY);
    SIM.mouse = { wx, wy };
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.onMouseMove && sp.onMouseMove(e)) return;
    if (SIM.pan.active) {
        SIM.camera.x = SIM.pan.camX0 - (e.offsetX - SIM.pan.cx0) / SIM.camera.scale;
        SIM.camera.y = SIM.pan.camY0 + (e.offsetY - SIM.pan.cy0) / SIM.camera.scale;
    }
});

function endPan() { SIM.pan.active = false; wrap.classList.remove('panning'); }
canvas.addEventListener('mouseup',    endPan);
canvas.addEventListener('mouseleave', endPan);

// Touch
let _pinchDist = null;
canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (e.touches.length === 1) {
        const t = e.touches[0];
        SIM.pan = { active: true, cx0: t.clientX, cy0: t.clientY,
                    camX0: SIM.camera.x, camY0: SIM.camera.y };
    } else if (e.touches.length === 2) {
        _pinchDist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
    }
}, { passive: false });

canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (e.touches.length === 1 && SIM.pan.active) {
        const t = e.touches[0];
        SIM.camera.x = SIM.pan.camX0 - (t.clientX - SIM.pan.cx0) / SIM.camera.scale;
        SIM.camera.y = SIM.pan.camY0 + (t.clientY - SIM.pan.cy0) / SIM.camera.scale;
    } else if (e.touches.length === 2 && _pinchDist) {
        const dist = Math.hypot(
            e.touches[0].clientX - e.touches[1].clientX,
            e.touches[0].clientY - e.touches[1].clientY
        );
        SIM.camera.scale *= dist / _pinchDist;
        _pinchDist = dist;
    }
}, { passive: false });

canvas.addEventListener('touchend', () => { SIM.pan.active = false; _pinchDist = null; });

// Keyboard
document.addEventListener('keydown', (e) => {
    const sp = SPREADS[SIM.spreadIndex];
    if (sp && sp.onKeyDown && sp.onKeyDown(e)) return;
    switch (e.key) {
        case ' ': case 'Spacebar':
            e.preventDefault();
            SIM.playing = !SIM.playing; syncBar(); break;
        case '.':
            SIM.warpIndex = Math.min(SIM.warpIndex + 1, SIM.warpLevels.length - 1);
            syncBar(); break;
        case ',':
            SIM.warpIndex = Math.max(SIM.warpIndex - 1, 0);
            syncBar(); break;
    }
});

window.addEventListener('resize', () => { resizeCanvas(); render(); });

/* ═══════════════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════════════ */
function init() {
    resizeCanvas();
    goTo(0);
    syncBar();
    SIM.ready = true;
    requestAnimationFrame(animLoop);
}

if (document.readyState === 'complete') init();
else window.addEventListener('load', init);
</script>
</body>
